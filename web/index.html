<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RDash Web</title>
<style>
  :root { --bg:#0f1216; --panel:#161b22; --line:#232b36; --fg:#d5dae2; --dim:#8b97a7;
          --cyan:#57c7d4; --green:#6fd08c; --yellow:#e2c85a; --red:#e06a6a; --blue:#6f9be0; --mag:#c78ad2; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.4 ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--fg); height:100vh; overflow:hidden; }
  #app { display:grid; grid-template-columns:260px 1fr 320px; grid-template-rows:34px 1fr; height:100vh; }
  header { grid-column:1/4; display:flex; align-items:center; gap:12px; padding:0 12px; background:var(--panel); border-bottom:1px solid var(--line); }
  header b { color:var(--cyan); } header .s { color:var(--dim); }
  aside,main { overflow:auto; } aside { background:var(--panel); border-right:1px solid var(--line); }
  #right { border-right:none; border-left:1px solid var(--line); }
  .sec { padding:6px 10px; color:var(--dim); text-transform:uppercase; font-size:11px; letter-spacing:.06em; position:sticky; top:0; background:var(--panel); }
  .row { padding:3px 10px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; white-space:nowrap; }
  .row:hover { background:#1d2530; } .row.sel { background:#243244; }
  .row .hz { color:var(--dim); } .row .live { color:var(--green); } .row .stale { color:var(--red); }
  .k-topic{color:var(--fg)} .k-node{color:var(--green)} .k-service{color:var(--blue)} .k-action{color:var(--cyan)} .k-param{color:var(--mag)}
  main { position:relative; background:radial-gradient(circle at 50% 40%, #131922, #0d1116); }
  svg { width:100%; height:100%; display:block; }
  .edge { stroke:#3a4658; stroke-width:1.2; marker-end:url(#arrow); }
  .edge.hi { stroke:var(--cyan); stroke-width:2; }
  .elabel { fill:var(--dim); font-size:9px; } .elabel.hi { fill:var(--cyan); }
  .node rect { fill:#1c2531; stroke:#3a4658; rx:5; } .node.hi rect { stroke:var(--cyan); fill:#243244; }
  .node.dim { opacity:.28; } .node text { fill:var(--fg); font-size:11px; } .node { cursor:grab; }
  #right .box { padding:8px 10px; border-bottom:1px solid var(--line); }
  #val { white-space:pre-wrap; color:var(--dim); font-size:12px; max-height:38vh; overflow:auto; }
  canvas { width:100%; height:150px; display:block; background:#0d1116; border:1px solid var(--line); border-radius:4px; }
  .fields label { display:inline-flex; gap:4px; align-items:center; margin:2px 6px 2px 0; color:var(--dim); cursor:pointer; }
  .hint { color:var(--dim); font-size:11px; padding:4px 10px; }
  .legend { position:absolute; bottom:8px; left:10px; color:var(--dim); font-size:11px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <b>RDash</b> <span class="s" id="verlbl">web</span>
    <span class="s" id="counts"></span>
    <span class="s" style="margin-left:auto" id="conn">연결 중…</span>
  </header>
  <aside id="side"></aside>
  <main>
    <svg id="graph">
      <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#3a4658"/></marker></defs>
      <g id="edges"></g><g id="nodes"></g>
    </svg>
    <div class="legend">노드 위상 그래프 — 드래그로 이동 · 노드 클릭으로 강조 · 화살표=발행→구독(라벨=토픽)</div>
  </main>
  <aside id="right">
    <div class="sec">선택 값</div>
    <div class="box"><div id="valtitle" class="hint">토픽을 클릭하면 라이브 값·플롯</div><div id="val"></div></div>
    <div class="sec">플롯 (숫자 필드)</div>
    <div class="box"><div id="fields" class="fields"></div><canvas id="plot" width="300" height="150"></canvas></div>
  </aside>
</div>
<script>
const $ = s => document.querySelector(s);
const SNAP = location.search.includes('snap');   // 스크린샷 모드: 잠시 후 SSE 닫아 네트워크 idle
let items = [], ver = '?';
fetch('/api/ver').then(r=>r.json()).then(o=>{ver=o.ver; $('#verlbl').textContent='ROS'+ver+' · localhost';});

// ---- 텔레메트리 SSE ----
const es = new EventSource('/events');
es.onopen = ()=> $('#conn').textContent='● 연결됨';
es.onerror = ()=> $('#conn').textContent='× 연결 끊김';
es.onmessage = e => { try { const o=JSON.parse(e.data); if(o.items){ items=o.items; render(); } } catch(_){} };
if(SNAP){ setTimeout(()=>{ try{selectTopic('/imu/data')}catch(_){}; }, 1200);
          setTimeout(()=>{ try{es.close()}catch(_){}; try{echoES&&echoES.close()}catch(_){}; }, 5200); }

// ---- 그래프 데이터 ----
function nodeName(e){ return Array.isArray(e)?e[0]:e; }
function buildGraph(){
  const topics = items.filter(i=>i.kind==='topic');
  const nodeSet = new Set(items.filter(i=>i.kind==='node').map(i=>i.name));
  const edges = new Map();  // "a\0b" -> Set(topic)
  for(const t of topics){
    const pubs=(t.pubs||[]).map(nodeName), subs=(t.subs||[]).map(nodeName);
    pubs.forEach(p=>nodeSet.add(p)); subs.forEach(s=>nodeSet.add(s));
    for(const p of pubs) for(const s of subs){ if(p===s) continue; const k=p+'\0'+s; if(!edges.has(k)) edges.set(k,new Set()); edges.get(k).add(t.name); }
  }
  return { nodes:[...nodeSet], edges:[...edges].map(([k,ts])=>({from:k.split('\0')[0],to:k.split('\0')[1],topics:[...ts]})) };
}

// ---- 포스 레이아웃 ----
let G = {nodes:[],edges:[]}, pos = new Map(), sel = null, dragging=null;
function render(){
  const g = buildGraph();
  const t=items.filter(i=>i.kind==='topic').length, n=items.filter(i=>i.kind==='node').length, s=items.filter(i=>i.kind==='service').length;
  $('#counts').textContent = `노드 ${n} · 토픽 ${t} · 서비스 ${s}`;
  // 새 노드는 중앙 근처에 배치
  const W=$('#graph').clientWidth||800, H=$('#graph').clientHeight||600;
  for(const id of g.nodes) if(!pos.has(id)) pos.set(id,{x:W/2+(Math.random()-.5)*200,y:H/2+(Math.random()-.5)*200,vx:0,vy:0});
  for(const id of [...pos.keys()]) if(!g.nodes.includes(id)) pos.delete(id);
  G=g; renderSidebar();
}
function tick(){
  const W=$('#graph').clientWidth||800, H=$('#graph').clientHeight||600, ids=[...pos.keys()];
  for(const a of ids){ const pa=pos.get(a);
    for(const b of ids){ if(a===b) continue; const pb=pos.get(b); let dx=pa.x-pb.x, dy=pa.y-pb.y; let d2=dx*dx+dy*dy||1; const f=34000/d2; pa.vx+=dx/Math.sqrt(d2)*f*0.02; pa.vy+=dy/Math.sqrt(d2)*f*0.02; }
    pa.vx += (W/2-pa.x)*0.0016; pa.vy += (H/2-pa.y)*0.0016;   // 중앙 중력(약하게)
  }
  for(const e of G.edges){ const pa=pos.get(e.from), pb=pos.get(e.to); if(!pa||!pb) continue;
    let dx=pb.x-pa.x, dy=pb.y-pa.y, d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-175)*0.008;
    pa.vx+=dx/d*f; pa.vy+=dy/d*f; pb.vx-=dx/d*f; pb.vy-=dy/d*f;
  }
  for(const id of ids){ const p=pos.get(id); if(dragging===id) continue; p.x+=p.vx*=0.82; p.y+=p.vy*=0.82; p.x=Math.max(60,Math.min(W-60,p.x)); p.y=Math.max(30,Math.min(H-24,p.y)); }
  paint();
  if(!(SNAP && ++tick.n>420)) requestAnimationFrame(tick);   // 스냅 모드: 유한 프레임 후 정지(스크린샷 idle)
}
tick.n=0;
function neighbors(id){ const s=new Set(); for(const e of G.edges){ if(e.from===id)s.add(e.to); if(e.to===id)s.add(e.from);} return s; }
function paint(){
  const eg=$('#edges'), ng=$('#nodes'); const nb = sel?neighbors(sel):null;
  eg.innerHTML=''; ng.innerHTML='';
  for(const e of G.edges){ const pa=pos.get(e.from), pb=pos.get(e.to); if(!pa||!pb) continue;
    const hi = sel && (e.from===sel||e.to===sel);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    // 노드 박스 가장자리에서 끝나도록 살짝 당김
    const dx=pb.x-pa.x,dy=pb.y-pa.y,d=Math.hypot(dx,dy)||1;
    ln.setAttribute('x1',pa.x+dx/d*46); ln.setAttribute('y1',pa.y+dy/d*12);
    ln.setAttribute('x2',pb.x-dx/d*46); ln.setAttribute('y2',pb.y-dy/d*12);
    ln.setAttribute('class','edge'+(hi?' hi':'')); eg.appendChild(ln);
    if(hi || G.edges.length<26){ const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x',(pa.x+pb.x)/2); tx.setAttribute('y',(pa.y+pb.y)/2-2); tx.setAttribute('text-anchor','middle');
      tx.setAttribute('class','elabel'+(hi?' hi':'')); tx.textContent=e.topics.length>1?e.topics[0]+' +'+(e.topics.length-1):e.topics[0]; eg.appendChild(tx); }
  }
  for(const id of pos.keys()){ const p=pos.get(id); const dim = sel && id!==sel && nb && !nb.has(id);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g'); g.setAttribute('class','node'+(id===sel?' hi':'')+(dim?' dim':'')); g.setAttribute('transform',`translate(${p.x},${p.y})`);
    const label=id.replace(/^\//,''); const w=Math.max(60,label.length*7+16);
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect'); r.setAttribute('x',-w/2); r.setAttribute('y',-11); r.setAttribute('width',w); r.setAttribute('height',22); g.appendChild(r);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text'); tx.setAttribute('text-anchor','middle'); tx.setAttribute('y',4); tx.textContent=label; g.appendChild(tx);
    g.onmousedown=ev=>{ dragging=id; sel=id; const move=m=>{ const rc=$('#graph').getBoundingClientRect(); const pp=pos.get(id); pp.x=m.clientX-rc.left; pp.y=m.clientY-rc.top; }; const up=()=>{dragging=null;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);}; document.addEventListener('mousemove',move); document.addEventListener('mouseup',up); ev.preventDefault(); };
    ng.appendChild(g);
  }
}

// ---- 사이드바 ----
function renderSidebar(){
  const side=$('#side'); const groups={topic:[],node:[],service:[],action:[],param:[]};
  for(const it of items) (groups[it.kind]||(groups[it.kind]=[])).push(it);
  const H=[]; const titles={topic:'토픽',node:'노드',service:'서비스',action:'액션',param:'파라미터'};
  for(const k of ['topic','action','node','service','param']){ const arr=(groups[k]||[]).filter(x=>!(x.name||'').includes('/_action/')); if(!arr.length) continue;
    H.push(`<div class="sec">${titles[k]||k} (${arr.length})</div>`);
    for(const it of arr.sort((a,b)=>a.name.localeCompare(b.name))){
      const hz = it.kind==='topic' ? `<span class="hz ${it.hz>0.1?'live':(it.age>3?'stale':'')}">${it.hz??''}</span>` : '';
      H.push(`<div class="row ${sel===it.name?'sel':''}" data-kind="${it.kind}" data-name="${it.name}"><span class="k-${it.kind}">${it.name}</span>${hz}</div>`);
    }
  }
  side.innerHTML=H.join('');
  side.querySelectorAll('.row').forEach(r=>r.onclick=()=>{ const name=r.dataset.name, kind=r.dataset.kind;
    if(kind==='node'){ sel=name; } if(kind==='topic'){ selectTopic(name); } });
}

// ---- 값/플롯 ----
let echoES=null, series={}, order=[], picked=new Set(), t0=Date.now();
function numeric(text){ const out={}; const stack=[]; for(const raw of text.split('\n')){ if(!raw.trim()||raw.trim()==='---')continue; const ind=raw.length-raw.trimStart().length; const m=raw.trimStart().match(/^([A-Za-z0-9_]+):\s*(.*)$/); if(!m)continue; const key=m[1],val=m[2].trim(); while(stack.length&&stack[stack.length-1].ind>=ind)stack.pop(); const path=[...stack.map(s=>s.key),key].join('.'); if(val===''){stack.push({ind,key});continue;} if(/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(val)) out[path]=parseFloat(val); } return out; }
function selectTopic(name){
  $('#valtitle').textContent=name; sel=name; renderSidebar();
  if(echoES) echoES.close();
  series={}; order=[]; picked=new Set(); t0=Date.now(); $('#fields').innerHTML='';
  echoES=new EventSource('/echo?topic='+encodeURIComponent(name));
  echoES.onmessage=e=>{ const text=JSON.parse(e.data); $('#val').textContent=text.slice(0,1200);
    const nums=numeric(text), t=(Date.now()-t0)/1000;
    for(const [k,v] of Object.entries(nums)){ if(!series[k]){ series[k]=[]; order.push(k); if(picked.size<2)picked.add(k); renderFields(); } series[k].push([t,v]); if(series[k].length>600)series[k].shift(); }
    drawPlot();
  };
}
function renderFields(){ $('#fields').innerHTML=order.map(k=>`<label><input type="checkbox" ${picked.has(k)?'checked':''} data-k="${k}">${k}</label>`).join('');
  $('#fields').querySelectorAll('input').forEach(c=>c.onchange=()=>{ c.checked?picked.add(c.dataset.k):picked.delete(c.dataset.k); drawPlot(); }); }
function drawPlot(){ const cv=$('#plot'), ctx=cv.getContext('2d'); const W=cv.width=cv.clientWidth, Hh=cv.height; ctx.clearRect(0,0,W,Hh);
  const keys=[...picked].filter(k=>series[k]&&series[k].length>1); if(!keys.length)return;
  let mn=Infinity,mx=-Infinity,tmin=Infinity,tmax=-Infinity;
  for(const k of keys) for(const [t,v] of series[k]){ if(v<mn)mn=v; if(v>mx)mx=v; if(t<tmin)tmin=t; if(t>tmax)tmax=t; }
  if(mx-mn<1e-9){mx+=1;mn-=1;} const cols=['#57c7d4','#e2c85a','#6fd08c','#c78ad2'];
  keys.forEach((k,ci)=>{ ctx.strokeStyle=cols[ci%cols.length]; ctx.lineWidth=1.4; ctx.beginPath();
    series[k].forEach(([t,v],i)=>{ const x=(t-tmin)/(tmax-tmin||1)*(W-8)+4, y=Hh-6-(v-mn)/(mx-mn)*(Hh-14); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); ctx.stroke();
    ctx.fillStyle=cols[ci%cols.length]; ctx.fillText(k,6,12+ci*12); });
}
window.addEventListener('resize', paint);
requestAnimationFrame(tick);
</script>
</body>
</html>
