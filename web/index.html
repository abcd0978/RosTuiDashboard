<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RDash Web</title>
<style>
  :root { --bg:#0f1216; --bg2:#0d1116; --panel:#161b22; --btn:#1c2531; --sel:#243244; --hover:#1d2530;
          --line:#232b36; --fg:#d5dae2; --dim:#8b97a7; --grad1:#131922; --grad2:#0d1116;
          --cyan:#57c7d4; --green:#6fd08c; --yellow:#e2c85a; --red:#e06a6a; --blue:#6f9be0; --mag:#c78ad2; }
  :root[data-theme="light"] { --bg:#eef1f5; --bg2:#ffffff; --panel:#ffffff; --btn:#eef2f7; --sel:#d6e4f5; --hover:#eff3f8;
          --line:#d3dae3; --fg:#1b2430; --dim:#5b6774; --grad1:#ffffff; --grad2:#e9eef4;
          --cyan:#0e8393; --green:#2f9e50; --yellow:#a9790a; --red:#cf3a3a; --blue:#3a63c0; --mag:#9647ab; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--fg); height:100vh; overflow:hidden; }
  #app { display:grid; grid-template-columns:260px 1fr 340px; grid-template-rows:36px 1fr; height:100vh; }
  header { grid-column:1/4; display:flex; align-items:center; gap:8px; padding:0 10px; background:var(--panel); border-bottom:1px solid var(--line); }
  header b { color:var(--cyan); } header .s { color:var(--dim); }
  header .tb { margin-left:auto; display:flex; gap:5px; flex-wrap:nowrap; overflow:auto; }
  header button { background:var(--btn); color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:2px 7px; cursor:pointer; font:inherit; font-size:12px; white-space:nowrap; }
  header button:hover { border-color:var(--cyan); color:var(--cyan); }
  .connbadge { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--dim); white-space:nowrap; }
  .connbadge .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); flex:none; }
  .connbadge.ok .dot { background:var(--green); box-shadow:0 0 6px var(--green); } .connbadge.ok { color:var(--green); }
  .connbadge.bad .dot { background:var(--red); } .connbadge.bad { color:var(--red); }
  .connbadge.wait .dot { background:var(--yellow); animation:pulse 1s infinite; } .connbadge.wait { color:var(--yellow); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .icobtn { padding:2px 6px !important; }
  aside,main { overflow:auto; } aside { background:var(--panel); border-right:1px solid var(--line); }
  #right { border-right:none; border-left:1px solid var(--line); }
  .sec { padding:6px 10px; color:var(--dim); text-transform:uppercase; font-size:11px; letter-spacing:.06em; position:sticky; top:0; background:var(--panel); }
  .row { padding:3px 10px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; white-space:nowrap; }
  .row:hover { background:var(--hover); } .row.sel { background:var(--sel); }
  .row .hz { color:var(--dim); } .row .hz.live { color:var(--green); } .row .hz.stale { color:var(--red); }
  .k-topic{color:var(--fg)} .k-node{color:var(--green)} .k-service{color:var(--blue)} .k-action{color:var(--cyan)} .k-param{color:var(--mag)}
  .mark{color:var(--yellow)} .edgemark{color:var(--dim)}
  main { position:relative; background:radial-gradient(circle at 50% 42%, var(--grad1), var(--grad2)); }
  svg { width:100%; height:100%; display:block; }
  .edge { stroke:#3a4658; stroke-width:1.2; marker-end:url(#arrow); }
  .edge.hi { stroke:var(--cyan); stroke-width:2; }
  .elabel { fill:#9aa7b8; font-size:11px; font-weight:600; paint-order:stroke; stroke:#0d1116; stroke-width:3px; stroke-linejoin:round; } .elabel.hi { fill:var(--cyan); }
  .gnode { cursor:grab; } .gnode.dim { opacity:.24; } .gnode text { fill:var(--fg); font-size:11px; pointer-events:none; }
  .gnode.node rect { fill:var(--btn); stroke:#3a4658; rx:5; } .gnode.node.hi rect { stroke:var(--cyan); fill:var(--sel); }
  .gnode.topic ellipse { fill:#14202b; stroke:#3f5266; } .gnode.topic.hi ellipse { stroke:var(--cyan); fill:#1d2f3f; } .gnode.topic text { fill:var(--cyan); font-size:10px; }
  .gnode.service polygon { fill:#141d2b; stroke:var(--blue); } .gnode.service.hi polygon { fill:#1d2740; stroke:var(--cyan); } .gnode.service text { fill:var(--blue); font-size:10px; }
  .gnode.action polygon { fill:#231a2b; stroke:var(--mag); } .gnode.action.hi polygon { fill:#2e2140; stroke:var(--cyan); } .gnode.action text { fill:var(--mag); font-size:10px; }
  /* 라이트 테마에서 그래프가 흰 배경에 자연스럽게 — 어두운 채움/후광을 밝게 */
  :root[data-theme="light"] .edge { stroke:#9aa7b8; } :root[data-theme="light"] .elabel { stroke:#fff; }
  :root[data-theme="light"] .gnode.topic ellipse { fill:#e6f2f5; } :root[data-theme="light"] .gnode.topic.hi ellipse { fill:#d2eaf0; }
  :root[data-theme="light"] .gnode.service polygon { fill:#e7edfb; } :root[data-theme="light"] .gnode.action polygon { fill:#f2e7f8; }
  :root[data-theme="light"] .gnode.node rect { stroke:#b0bccb; }
  #gctrl { position:absolute; top:8px; left:10px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; background:rgba(15,18,22,.85); border:1px solid var(--line); border-radius:6px; padding:5px 9px; font-size:11px; color:var(--dim); z-index:2; }
  #gctrl .seg button { background:var(--btn); border:1px solid var(--line); color:var(--dim); padding:2px 8px; cursor:pointer; font:inherit; }
  #gctrl .seg button:first-child { border-radius:4px 0 0 4px; } #gctrl .seg button:last-child { border-radius:0 4px 4px 0; border-left:none; }
  #gctrl .seg button.on { background:var(--sel); color:var(--cyan); border-color:var(--cyan); }
  #gctrl label { display:inline-flex; gap:3px; align-items:center; cursor:pointer; }
  #right .box { padding:8px 10px; border-bottom:1px solid var(--line); }
  #val { white-space:pre-wrap; color:var(--dim); font-size:12px; max-height:36vh; overflow:auto; }
  canvas { width:100%; height:150px; display:block; background:var(--bg2); border:1px solid var(--line); border-radius:4px; }
  .fields label { display:inline-flex; gap:4px; align-items:center; margin:2px 6px 2px 0; color:var(--dim); cursor:pointer; }
  .hint { color:var(--dim); font-size:11px; } .legend { position:absolute; bottom:8px; left:10px; color:var(--dim); font-size:11px; }
  .actbtns { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  /* 모달 */
  #modal { position:fixed; inset:0; background:rgba(6,9,13,.6); display:none; align-items:flex-start; justify-content:center; padding:5vh 0; z-index:9; }
  #modal.on { display:flex; }
  .m { background:var(--panel); border:1px solid var(--line); border-radius:8px; width:min(1000px,92vw); max-height:88vh; overflow:hidden; display:flex; flex-direction:column; }
  .m h3 { margin:0; padding:10px 14px; border-bottom:1px solid var(--line); color:var(--cyan); display:flex; justify-content:space-between; align-items:center; }
  .m h3 .x { cursor:pointer; color:var(--dim); } .m h3 .x:hover{color:var(--red)}
  .m .body { padding:10px 14px; overflow:auto; }
  pre.out { white-space:pre-wrap; margin:0; color:var(--fg); font-size:12px; }
  table.tbl { width:100%; border-collapse:collapse; } table.tbl td,table.tbl th { text-align:left; padding:3px 8px; border-bottom:1px solid var(--line); }
  table.tbl tr:hover { background:var(--hover); } .lrow.WARN{color:var(--yellow)} .lrow.ERROR{color:var(--red)} .lrow.OK{color:var(--green)} .lrow.STALE{color:var(--dim)}
  input,textarea,select { background:var(--bg2); color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:4px 6px; font:inherit; }
  button.act { background:var(--btn); color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:4px 10px; cursor:pointer; font:inherit; }
  button.act:hover{ border-color:var(--cyan); color:var(--cyan); }
  .badge{ padding:0 6px; border-radius:8px; font-size:11px; } .badge.run{background:#1d3b2a;color:var(--green)} .badge.done{background:#2a2f38;color:var(--dim)} .badge.error{background:#3b1d1d;color:var(--red)}
  /* PlotLab */
  .pl { display:flex; flex-direction:column; height:100%; }
  .pl-bar { display:flex; gap:6px; align-items:center; flex-wrap:wrap; padding-bottom:8px; border-bottom:1px solid var(--line); margin-bottom:8px; }
  .pl-bar button { padding:2px 8px; }
  .pl-body { display:flex; gap:8px; flex:1; min-height:0; }
  .pl-list { width:220px; overflow:auto; border-right:1px solid var(--line); padding-right:6px; }
  .pl-topic { color:var(--dim); font-size:11px; padding:3px 4px; cursor:pointer; border-top:1px solid var(--line); } .pl-topic:hover { color:var(--cyan); }
  .pl-chip { margin:2px 0 2px 12px; padding:2px 7px; background:var(--btn); border:1px solid var(--line); border-radius:4px; font-size:11px; cursor:grab; color:var(--fg); }
  .pl-chip:hover { border-color:var(--cyan); }
  .pl-grid { display:flex; flex-wrap:wrap; align-content:flex-start; gap:8px; flex:1; overflow:auto; min-height:0; }
  .pl-cell { position:relative; display:flex; flex-direction:column; background:var(--bg2); border:1px solid var(--line); border-radius:6px; width:100%; height:230px; min-width:220px; min-height:140px; resize:both; overflow:hidden; }
  .pl-cell::after { content:'⤡'; position:absolute; right:2px; bottom:0; color:var(--dim); font-size:11px; pointer-events:none; }
  .pl-cell.drop { border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan) inset; }
  .pl-canvas { flex:1; width:100%; min-height:120px; display:block; }
  .pl-legend { display:flex; flex-wrap:wrap; gap:4px 12px; padding:4px 8px; border-top:1px solid var(--line); font-size:11px; }
  .pl-cv { display:inline-flex; align-items:center; gap:4px; color:var(--fg); }
  .pl-dot { width:10px; height:3px; border-radius:2px; display:inline-block; }
  .pl-cv select { padding:0 2px; font-size:10px; } .pl-stat { color:var(--dim); font-size:10px; } .pl-rm { cursor:pointer; color:var(--dim); } .pl-rm:hover{color:var(--red)}
  .pl-x { position:absolute; top:4px; right:6px; background:none; border:none; color:var(--dim); cursor:pointer; font-size:12px; z-index:2; } .pl-x:hover{color:var(--red)}
  .pl-scrubbar { display:flex; align-items:center; gap:8px; padding-top:8px; border-top:1px solid var(--line); margin-top:8px; }
  .pl-scrub { flex:1; accent-color:var(--cyan); }
  .pl-btn2 { font-size:10px; padding:1px 6px; background:var(--btn); border:1px solid var(--line); color:var(--dim); cursor:pointer; border-radius:3px; margin-right:4px; }
  .pl-btn2.on { color:var(--cyan); border-color:var(--cyan); }
  .pl-fx { display:flex; gap:4px; align-items:center; width:100%; margin-bottom:4px; }
  .pl-fx input { flex:1; font-size:11px; }
  /* 로딩 스피너 */
  .loading { display:flex; align-items:center; gap:9px; color:var(--dim); padding:14px 4px; font-size:12px; }
  .spin { width:15px; height:15px; border:2px solid var(--line); border-top-color:var(--cyan); border-radius:50%; animation:spin .7s linear infinite; flex:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  /* 빈 상태 */
  .empty { text-align:center; color:var(--dim); padding:26px 16px; }
  .empty .ic { font-size:30px; opacity:.65; } .empty .msg { margin-top:8px; color:var(--fg); font-size:13px; } .empty .sub { margin-top:4px; font-size:11px; }
  /* 토스트 */
  #toasts { position:fixed; right:14px; bottom:14px; display:flex; flex-direction:column; gap:8px; z-index:20; pointer-events:none; }
  .toast { pointer-events:auto; min-width:180px; max-width:340px; padding:8px 12px; border-radius:6px; border:1px solid var(--line); background:var(--panel); color:var(--fg);
           font-size:12px; box-shadow:0 4px 16px rgba(0,0,0,.35); display:flex; gap:8px; align-items:flex-start; animation:tin .18s ease-out; }
  .toast.out { animation:tout .25s ease-in forwards; }
  .toast.ok { border-left:3px solid var(--green); } .toast.warn { border-left:3px solid var(--yellow); } .toast.err { border-left:3px solid var(--red); } .toast.info { border-left:3px solid var(--cyan); }
  .toast .ti { flex:none; }
  @keyframes tin { from { opacity:0; transform:translateY(8px); } } @keyframes tout { to { opacity:0; transform:translateX(20px); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <b>RDash</b> <span class="s" id="verlbl">web</span>
    <span class="s" id="counts"></span>
    <div class="tb" id="toolbar"></div>
    <span class="s" id="clock" title="wallclock · /clock 있으면 시뮬레이션 시각"></span>
    <button id="wsbtn" title="도킹 워크스페이스 (여러 패널 동시)">▦ 워크스페이스</button>
    <button id="themebtn" class="icobtn" title="라이트/다크 테마 전환">🌙</button>
    <span class="connbadge wait" id="conn"><span class="dot"></span><span id="connlbl">연결 중…</span></span>
  </header>
  <aside id="side"></aside>
  <main>
    <svg id="graph"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#3a4658"/></marker></defs><g id="edges"></g><g id="nodes"></g></svg>
    <div class="legend">■ 노드 · ⬭ 토픽 · ◆ 서비스 · ⬡ 액션 — 드래그 이동 · 클릭 강조 · 초록=발행 청록=구독 파랑=서비스 보라=액션 · 노드모드 숫자=토픽 수</div>
  </main>
  <aside id="right">
    <div class="sec">선택 값</div>
    <div class="box"><div id="valtitle" class="hint">토픽을 클릭하면 라이브 값·플롯</div><div class="actbtns" id="valacts"></div><div id="val"></div></div>
    <div class="sec">플롯 (숫자 필드)</div>
    <div class="box"><div id="fields" class="fields"></div><canvas id="plot" width="300" height="150"></canvas></div>
  </aside>
</div>
<div id="modal"><div class="m"><h3><span id="mtitle"></span><span class="x" onclick="RD.closeModal()">✕ (Esc)</span></h3><div class="body" id="mbody"></div></div></div>
<div id="toasts"></div>
<script src="/app.js"></script>
<script src="/workspace.js"></script>
</body>
</html>
