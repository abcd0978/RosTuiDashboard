<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RDash Web</title>
<style>
  :root { --bg:#0f1216; --panel:#161b22; --line:#232b36; --fg:#d5dae2; --dim:#8b97a7;
          --cyan:#57c7d4; --green:#6fd08c; --yellow:#e2c85a; --red:#e06a6a; --blue:#6f9be0; --mag:#c78ad2; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--fg); height:100vh; overflow:hidden; }
  #app { display:grid; grid-template-columns:260px 1fr 340px; grid-template-rows:36px 1fr; height:100vh; }
  header { grid-column:1/4; display:flex; align-items:center; gap:8px; padding:0 10px; background:var(--panel); border-bottom:1px solid var(--line); }
  header b { color:var(--cyan); } header .s { color:var(--dim); }
  header .tb { margin-left:auto; display:flex; gap:5px; flex-wrap:nowrap; overflow:auto; }
  header button { background:#1c2531; color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:2px 7px; cursor:pointer; font:inherit; font-size:12px; white-space:nowrap; }
  header button:hover { border-color:var(--cyan); color:var(--cyan); }
  aside,main { overflow:auto; } aside { background:var(--panel); border-right:1px solid var(--line); }
  #right { border-right:none; border-left:1px solid var(--line); }
  .sec { padding:6px 10px; color:var(--dim); text-transform:uppercase; font-size:11px; letter-spacing:.06em; position:sticky; top:0; background:var(--panel); }
  .row { padding:3px 10px; cursor:pointer; display:flex; justify-content:space-between; gap:8px; white-space:nowrap; }
  .row:hover { background:#1d2530; } .row.sel { background:#243244; }
  .row .hz { color:var(--dim); } .row .hz.live { color:var(--green); } .row .hz.stale { color:var(--red); }
  .k-topic{color:var(--fg)} .k-node{color:var(--green)} .k-service{color:var(--blue)} .k-action{color:var(--cyan)} .k-param{color:var(--mag)}
  .mark{color:var(--yellow)} .edgemark{color:var(--dim)}
  main { position:relative; background:radial-gradient(circle at 50% 42%, #131922, #0d1116); }
  svg { width:100%; height:100%; display:block; }
  .edge { stroke:#3a4658; stroke-width:1.2; marker-end:url(#arrow); }
  .edge.hi { stroke:var(--cyan); stroke-width:2; }
  .elabel { fill:var(--dim); font-size:9px; } .elabel.hi { fill:var(--cyan); }
  .node rect { fill:#1c2531; stroke:#3a4658; rx:5; } .node.hi rect { stroke:var(--cyan); fill:#243244; }
  .node.dim { opacity:.28; } .node text { fill:var(--fg); font-size:11px; } .node { cursor:grab; }
  #right .box { padding:8px 10px; border-bottom:1px solid var(--line); }
  #val { white-space:pre-wrap; color:var(--dim); font-size:12px; max-height:36vh; overflow:auto; }
  canvas { width:100%; height:150px; display:block; background:#0d1116; border:1px solid var(--line); border-radius:4px; }
  .fields label { display:inline-flex; gap:4px; align-items:center; margin:2px 6px 2px 0; color:var(--dim); cursor:pointer; }
  .hint { color:var(--dim); font-size:11px; } .legend { position:absolute; bottom:8px; left:10px; color:var(--dim); font-size:11px; }
  .actbtns { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  /* 모달 */
  #modal { position:fixed; inset:0; background:rgba(6,9,13,.6); display:none; align-items:flex-start; justify-content:center; padding:5vh 0; z-index:9; }
  #modal.on { display:flex; }
  .m { background:var(--panel); border:1px solid var(--line); border-radius:8px; width:min(1000px,92vw); max-height:88vh; overflow:hidden; display:flex; flex-direction:column; }
  .m h3 { margin:0; padding:10px 14px; border-bottom:1px solid var(--line); color:var(--cyan); display:flex; justify-content:space-between; align-items:center; }
  .m h3 .x { cursor:pointer; color:var(--dim); } .m h3 .x:hover{color:var(--red)}
  .m .body { padding:10px 14px; overflow:auto; }
  pre.out { white-space:pre-wrap; margin:0; color:var(--fg); font-size:12px; }
  table.tbl { width:100%; border-collapse:collapse; } table.tbl td,table.tbl th { text-align:left; padding:3px 8px; border-bottom:1px solid var(--line); }
  table.tbl tr:hover { background:#1d2530; } .lrow.WARN{color:var(--yellow)} .lrow.ERROR{color:var(--red)} .lrow.OK{color:var(--green)} .lrow.STALE{color:var(--dim)}
  input,textarea,select { background:#0d1116; color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:4px 6px; font:inherit; }
  button.act { background:#1c2531; color:var(--fg); border:1px solid var(--line); border-radius:4px; padding:4px 10px; cursor:pointer; font:inherit; }
  button.act:hover{ border-color:var(--cyan); color:var(--cyan); }
  .badge{ padding:0 6px; border-radius:8px; font-size:11px; } .badge.run{background:#1d3b2a;color:var(--green)} .badge.done{background:#2a2f38;color:var(--dim)} .badge.error{background:#3b1d1d;color:var(--red)}
</style>
</head>
<body>
<div id="app">
  <header>
    <b>RDash</b> <span class="s" id="verlbl">web</span>
    <span class="s" id="counts"></span>
    <div class="tb" id="toolbar"></div>
    <span class="s" id="conn">연결 중…</span>
  </header>
  <aside id="side"></aside>
  <main>
    <svg id="graph"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#3a4658"/></marker></defs><g id="edges"></g><g id="nodes"></g></svg>
    <div class="legend">노드 위상 그래프 — 드래그 이동 · 노드 클릭 강조 · 화살표=발행→구독(라벨=토픽)</div>
  </main>
  <aside id="right">
    <div class="sec">선택 값</div>
    <div class="box"><div id="valtitle" class="hint">토픽을 클릭하면 라이브 값·플롯</div><div class="actbtns" id="valacts"></div><div id="val"></div></div>
    <div class="sec">플롯 (숫자 필드)</div>
    <div class="box"><div id="fields" class="fields"></div><canvas id="plot" width="300" height="150"></canvas></div>
  </aside>
</div>
<div id="modal"><div class="m"><h3><span id="mtitle"></span><span class="x" onclick="RD.closeModal()">✕ (Esc)</span></h3><div class="body" id="mbody"></div></div></div>
<script src="/app.js"></script>
</body>
</html>
