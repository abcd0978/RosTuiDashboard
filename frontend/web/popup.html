<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>RDash Plot</title>
<style>
  :root { --bg:#0d1116; --line:#232b36; --fg:#d5dae2; --dim:#8b97a7; }
  * { box-sizing:border-box; } html,body { margin:0; height:100%; background:var(--bg); color:var(--fg); font:12px ui-monospace,Menlo,Consolas,monospace; }
  #wrap { display:flex; flex-direction:column; height:100vh; }
  #bar { display:flex; gap:8px; align-items:center; padding:4px 8px; border-bottom:1px solid var(--line); color:var(--dim); }
  canvas { flex:1; width:100%; display:block; }
  #lg { display:flex; flex-wrap:wrap; gap:4px 14px; padding:4px 8px; border-top:1px solid var(--line); font-size:11px; }
  .dot { display:inline-block; width:10px; height:3px; border-radius:2px; margin-right:4px; vertical-align:middle; }
  select { background:#0d1116; color:var(--fg); border:1px solid var(--line); border-radius:3px; font:inherit; font-size:10px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="bar"><b style="color:#57c7d4">RDash Plot</b><span id="info"></span><span style="margin-left:auto" id="mode"></span></div>
  <canvas id="c"></canvas>
  <div id="lg"></div>
</div>
<script>
'use strict';
const cfg = (() => { try { return JSON.parse(decodeURIComponent(location.hash.slice(1))); } catch (_) { return { curves: [] }; } })();
const curves = cfg.curves || [];
let W = cfg.W || 10; const S = {}; const t0 = Date.now();
const TFL = { raw: '원값', d1: 'd/dt', d2: 'd²/dt²', d3: 'd³/dt³', i1: '∫dt', i2: '∫∫dt', abs: '|x|', movavg: '이동평균' };
document.title = 'RDash · ' + curves.map((c) => c.field).join(', ');
document.getElementById('mode').textContent = (cfg.xy ? 'XY · ' : cfg.fft ? 'FFT · ' : '') + '창 ' + W + 's';

// 필드 파서(dotted numeric leaves)
function numeric(text) { const out = {}, st = []; for (const raw of text.split('\n')) { if (!raw.trim() || raw.trim() === '---') continue; const ind = raw.length - raw.trimStart().length; const m = raw.trimStart().match(/^([A-Za-z0-9_]+):\s*(.*)$/); if (!m) continue; const k = m[1], v = m[2].trim(); while (st.length && st[st.length - 1].ind >= ind) st.pop(); const path = [...st.map((s) => s.k), k].join('.'); if (v === '') { st.push({ ind, k }); continue; } if (/^-?\d+(\.\d+)?([eE][+-]?\d+)?$/.test(v)) out[path] = parseFloat(v); } return out; }
const derivOnce = (d) => { const o = []; for (let i = 1; i < d.length; i++) { const dt = d[i][0] - d[i - 1][0] || 1e-6; o.push([d[i][0], (d[i][1] - d[i - 1][1]) / dt]); } return o; };
const integOnce = (d) => { const o = []; let a = 0; for (let i = 1; i < d.length; i++) { a += (d[i][1] + d[i - 1][1]) / 2 * (d[i][0] - d[i - 1][0]); o.push([d[i][0], a]); } return o; };
function applyT(data, tf) { if (!data || data.length < 2 || tf === 'raw') return data || []; if (tf[0] === 'd') { let r = data; const n = +tf[1] || 1; for (let k = 0; k < n && r.length > 1; k++) r = derivOnce(r); return r; } if (tf[0] === 'i') { let r = data; const n = +tf[1] || 1; for (let k = 0; k < n && r.length > 1; k++) r = integOnce(r); return r; } if (tf === 'abs') return data.map(([t, v]) => [t, Math.abs(v)]); if (tf === 'movavg') { const q = []; let s = 0; const o = []; for (const [t, v] of data) { q.push(v); s += v; if (q.length > 12) s -= q.shift(); o.push([t, s / q.length]); } return o; } return data; }

// 토픽별 SSE 구독(중복 제거)
const es = {};
for (const c of curves) { if (es[c.topic]) continue; const e = new EventSource('/echo?topic=' + encodeURIComponent(c.topic)); es[c.topic] = e; e.onmessage = (ev) => { let txt; try { txt = JSON.parse(ev.data); } catch (_) { return; } const t = (Date.now() - t0) / 1000, nums = numeric(txt); for (const k in nums) { const key = c.topic + ' ' + k; (S[key] || (S[key] = [])).push([t, nums[k]]); if (S[key].length > 4000) S[key].shift(); } }; }

// 범례 + 변환 드롭다운
const lg = document.getElementById('lg');
function drawLegend() { lg.innerHTML = ''; curves.forEach((c) => { const sp = document.createElement('span'); const dot = document.createElement('span'); dot.className = 'dot'; dot.style.background = c.color; sp.append(dot, document.createTextNode(c.field + ' ')); const sel = document.createElement('select'); for (const t in TFL) { const o = document.createElement('option'); o.value = t; o.textContent = TFL[t]; sel.append(o); } sel.value = c.tf || 'raw'; sel.onchange = () => { c.tf = sel.value; }; sp.append(sel); lg.append(sp); }); }
drawLegend();

const cv = document.getElementById('c'), info = document.getElementById('info');
function draw() {
  const w = cv.width = cv.clientWidth, h = cv.height = cv.clientHeight, ctx = cv.getContext('2d'); ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = '#1b222c'; for (let i = 0; i <= 4; i++) { const y = h * i / 4; ctx.beginPath(); ctx.moveTo(32, y); ctx.lineTo(w, y); ctx.stroke(); }
  let lt = 0; for (const k in S) { const a = S[k]; if (a.length) lt = Math.max(lt, a[a.length - 1][0]); }
  const t1 = lt, tt0 = t1 - W;
  const cd = curves.map((c) => ({ c, d: applyT(S[c.topic + ' ' + c.field], c.tf).filter(([t]) => t >= tt0 && t <= t1) }));
  if (cfg.xy && curves.length >= 2) {
    const xd = cd[0].d; let xmn = Infinity, xmx = -Infinity, ymn = Infinity, ymx = -Infinity; for (const [, v] of xd) { xmn = Math.min(xmn, v); xmx = Math.max(xmx, v); } for (let i = 1; i < cd.length; i++) for (const [, v] of cd[i].d) { ymn = Math.min(ymn, v); ymx = Math.max(ymx, v); }
    if (!isFinite(xmn)) { xmn = 0; xmx = 1; } if (xmx - xmn < 1e-9) { xmx += 1; xmn -= 1; } if (!isFinite(ymn)) { ymn = 0; ymx = 1; } if (ymx - ymn < 1e-9) { ymx += 1; ymn -= 1; }
    const sampleAt = (d, t) => { if (!d || !d.length) return 0; let lo = 0, hi = d.length - 1, r = d[0][1]; while (lo <= hi) { const m = (lo + hi) >> 1; if (d[m][0] <= t) { r = d[m][1]; lo = m + 1; } else hi = m - 1; } return r; };
    for (let i = 1; i < cd.length; i++) { ctx.strokeStyle = cd[i].c.color; ctx.lineWidth = 1.3; ctx.beginPath(); cd[i].d.forEach(([t, vy], j) => { const vx = sampleAt(xd, t); const x = 32 + (vx - xmn) / (xmx - xmn) * (w - 40), y = h - 6 - (vy - ymn) / (ymx - ymn) * (h - 14); j ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }); ctx.stroke(); }
    info.textContent = ' XY(' + curves[0].field + ')'; requestAnimationFrame(draw); return;
  }
  let mn = Infinity, mx = -Infinity; for (const { d } of cd) for (const [, v] of d) { mn = Math.min(mn, v); mx = Math.max(mx, v); }
  if (!isFinite(mn)) { mn = 0; mx = 1; } if (mx - mn < 1e-9) { mx += 1; mn -= 1; }
  const X = (t) => 32 + (t - tt0) / (W || 1) * (w - 36), Y = (v) => h - 4 - (v - mn) / (mx - mn) * (h - 16);
  ctx.fillStyle = '#5c6672'; ctx.font = '9px monospace'; ctx.fillText(mx.toPrecision(3), 2, 9); ctx.fillText(mn.toPrecision(3), 2, h - 4);
  for (const { c, d } of cd) { ctx.strokeStyle = c.color; ctx.lineWidth = 1.3; ctx.beginPath(); d.forEach(([t, v], i) => { const x = X(t), y = Y(v); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); }); ctx.stroke(); }
  info.textContent = ' t=' + t1.toFixed(1) + 's';
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
window.addEventListener('beforeunload', () => { for (const k in es) es[k].close(); });
</script>
</body>
</html>
